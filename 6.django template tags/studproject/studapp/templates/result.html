{% extends 'base.html' %}

{% block content %}

<h2>Student Results</h2>

<table border="1">

<tr>
    <th>No</th>
    <th>Name</th>
    <th>Mark</th>
    <th>Result</th>
</tr>

{% for student in students %}

<tr>

<td>{{ forloop.counter }}</td>

<td>{{ student.name }}</td>

<td>{{ student.mark }}</td>

<td>

{% if student.mark >= 50 %}

Pass

{% else %}

Fail

{% endif %}

</td>

</tr>

{% empty %}

<tr>

<td colspan="4">

No Students Found

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
